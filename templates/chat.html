<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Secure SMS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 15px; animation: fadeIn 0.3s; }
        .message.sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .message.received { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        
        .risk-badge { font-size: 0.75em; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        .risk-High { background: #dc3545; color: white; }
        .risk-Critical { background: #8b0000; color: white; }
        .risk-Medium { background: #ffc107; color: #333; }
        .risk-Low { background: #28a745; color: white; }
        .risk-pending { background: #6c757d; color: white; font-style: italic; }

        .meta { font-size: 0.7em; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }
        
        #input-area { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #34495e; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    🛡️ Sentinel Secure SMS
</header>

<div id="chat-box">
    <div style="text-align: center; color: #888; font-size: 0.9em; margin-top: 20px;">
        🔒 End-to-End Threat Scanning Active<br>
        Share links safely.
    </div>
</div>

<div id="input-area">
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <button onclick="document.getElementById('file-input').click()" style="padding: 10px; margin-right:5px;">📷</button>
    <input type="text" id="msg-input" placeholder="Type a message or paste a link..." onkeypress="handleEnter(event)">
    <button onclick="sendMessage()">Send ➤</button>
</div>

<script>
    const socket = io();
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('msg-input');
    const fileInput = document.getElementById('file-input');
    const myId = Math.floor(Math.random() * 1000000); // Simple session ID

    socket.on('connect', () => {
        console.log("Connected to Sentinel Server");
    });

    socket.on('receive_chat', (data) => {
        // Check if message already exists (for pending -> final updates)
        let existingMsg = document.getElementById(`msg-${data.tempId}`);
        
        if (existingMsg) {
            // Update existing message (e.g. from Pending to Low Risk)
            updateMessageStyle(existingMsg, data);
        } else {
            // Create new message
            createMessageElement(data);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        const tempId = Date.now();
        
        // Emit to server
        socket.emit('send_chat', {
            message: text,
            tempId: tempId,
            sender_local_id: myId 
        });

        input.value = '';
    }

    function createMessageElement(data) {
        const div = document.createElement('div');
        div.id = `msg-${data.tempId}`;
        
        // Determine if sent by me or other
        // Note: In a real app, we'd use the socket.id, but for this demo:
        // The server broadcasts back. We can just check class based on sender_id.
        const isMe = (data.sender_id === socket.id); 
        div.className = `message ${isMe ? 'sent' : 'received'}`;

        div.innerHTML = `
            <span class="content">${escapeHtml(data.message)}</span>
            <span class="risk-badge risk-${data.risk_level.split(' ')[0]}">${data.risk_level}</span>
            <span class="meta">${data.target !== 'Text Only' ? 'Target: ' + data.target : ''}</span>
        `;

        chatBox.appendChild(div);
    }

    function updateMessageStyle(element, data) {
        const badge = element.querySelector('.risk-badge');
        if (badge) {
            badge.className = `risk-badge risk-${data.risk_level.split(' ')[0]}`;
            badge.innerText = data.risk_level;
            
            // Update score tooltip or text if needed
            if (data.score > 0) {
                badge.title = `Threat Score: ${data.score}/100`;
            }
        }
    }

    // Handle Image Uploads (MMS)
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const tempId = Date.now();
                // Send base64 image to server for analysis
                socket.emit('analyze_image', { image: e.target.result, tempId: tempId });
            };
            reader.readAsDataURL(file);
            this.value = ''; // Reset
        }
    });

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
