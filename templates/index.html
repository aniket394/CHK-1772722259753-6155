<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sentinel Secure Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Header */
        .app-header {
            padding: 15px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
            text-align: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .app-header h1 { margin: 0; font-size: 18px; }
        .status-dot { height: 10px; width: 10px; background-color: #F44336; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        /* Chat Area */
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        
        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        
        .msg-sent {
            align-self: flex-end;
            background-color: #005c4b; /* WhatsApp Greenish */
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .msg-received {
            align-self: flex-start;
            background-color: #333;
            color: white;
            border-bottom-left-radius: 4px;
        }

        /* System message style */
        .msg-system {
            align-self: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: 12px;
            border-radius: 8px;
            max-width: 90%;
            text-align: center;
        }

        /* Risk Styles */
        .risk-high { border: 2px solid #d32f2f; background-color: #3a0b0b; }
        .risk-medium { border: 2px solid #ffa000; }
        
        .risk-badge {
            display: block;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-high { color: #ff5252; }
        .badge-medium { color: #ffb74d; }
        .badge-safe { color: #4CAF50; }
        .badge-pending { color: #999; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Area */
        .input-container {
            padding: 15px;
            background-color: #1e1e1e;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-field {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #555;
            background-color: #2c2c2c;
            color: white;
            outline: none;
        }
        .send-btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>🛡️ Sentinel Secure Chat</h1>
        <div style="font-size: 12px; color: #888; margin-top: 5px;">
            <span id="status-dot" class="status-dot"></span>
            <span id="connection-status">Disconnected</span>
        </div>
    </div>

    <div id="chat-container">
        <div class="message msg-system">
            🔒 Messages are scanned for threats in real-time.
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="manualInput" class="input-field" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="sendManualScan()">&#10148;</button>
    </div>

    <script>
        const socket = io();
        const statusLabel = document.getElementById('connection-status');
        const statusDot = document.getElementById('status-dot');
        const chatContainer = document.getElementById('chat-container');

        socket.on('connect', () => {
            statusLabel.innerText = "Connected";
            statusDot.style.backgroundColor = "#4CAF50";
        });

        socket.on('disconnect', () => {
            statusLabel.innerText = "Disconnected";
            statusDot.style.backgroundColor = "#F44336";
        });

        // Listen for incoming chat messages
        socket.on('receive_chat', (data) => {
            // Determine the unique ID for this message in the DOM
            // Sender uses 'msg-{tempId}', Receiver uses 'msg-{senderId}-{tempId}'
            let domId = `msg-${data.sender_id}-${data.tempId}`;
            if (data.sender_id === socket.id) {
                domId = `msg-${data.tempId}`;
            }

            const existingMsg = document.getElementById(domId);
            if (existingMsg) {
                updateMessage(existingMsg, data);
            } else {
                addMessageToChat(data, false, domId);
            }
        });

        function createMessageElement(data) {
            const isMe = (data.sender_id === socket.id);
            const isSystem = (data.sender_id === 'System');
            const msgDiv = document.createElement('div');
            
            msgDiv.classList.add('message');
            if (isSystem) {
                msgDiv.classList.add('msg-system');
            } else {
                msgDiv.classList.add(isMe ? 'msg-sent' : 'msg-received');
            }
            return msgDiv;
        }

        function updateMessage(msgDiv, data) {
            // Clear pending state
            msgDiv.classList.remove('risk-medium'); // In case of scan failure
            msgDiv.classList.remove('risk-high');

            let badgeHtml = "";
            // Risk Styling
            if (data.risk_level === "High Risk") {
                msgDiv.classList.add('risk-high');
                badgeHtml = `<span class="risk-badge badge-high">🚨 High Risk Detected</span>`;
            } else if (data.risk_level === "Medium Risk") {
                msgDiv.classList.add('risk-medium');
                badgeHtml = `<span class="risk-badge badge-medium">⚠️ Suspicious</span>`;
            } else if (data.risk_level === "pending") {
                badgeHtml = `<span class="risk-badge badge-pending">Scanning...</span>`;
            } else {
                badgeHtml = `<span class="risk-badge badge-safe">🛡️ Verified Safe</span>`;
            }

            msgDiv.innerHTML = `${badgeHtml}${data.message}`;
        }

        function addMessageToChat(data, isPending = false, customId = null) {
            const msgDiv = createMessageElement(data);

            if (isPending) {
                msgDiv.id = `msg-${data.tempId}`;
                updateMessage(msgDiv, { ...data, risk_level: "pending" });
            } else {
                if (customId) msgDiv.id = customId;
                updateMessage(msgDiv, data);
                // Vibrate if I received a dangerous message from someone else
                if (data.sender_id !== socket.id && data.risk_level === "High Risk") {
                    navigator.vibrate([500, 200, 500]); 
                }
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendManualScan() {
            const input = document.getElementById('manualInput');
            const msg = input.value;
            if (msg.trim().length > 0) {
                const tempId = Date.now();
                const pendingData = { sender_id: socket.id, message: msg, tempId: tempId };

                // 1. Immediately show the message in a "pending" state
                addMessageToChat(pendingData, true);

                // 2. Send to server for analysis
                socket.emit('send_chat', { message: msg, tempId: tempId });
                input.value = ""; // Clear input
            }
        }
        
        // Allow Enter key to send
        document.getElementById('manualInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Prevents adding a new line
                sendManualScan();
            }
        });
    </script>
</body>
</html>
